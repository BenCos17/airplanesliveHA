name: Release On Builder Success

on:
  workflow_run:
    workflows: ["Builder"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Tag and publish release
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Read release metadata from repository at built commit
        id: metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          config=$(gh api -H "Accept: application/vnd.github.raw" \
            "/repos/${{ github.repository }}/contents/AirplanesLiveHA/config.yaml?ref=${{ github.event.workflow_run.head_sha }}")
          version=$(printf '%s\n' "$config" | grep -E '^version:\s*"[0-9]+\.[0-9]+\.[0-9]+"\s*$' | sed -E 's/version:\s*"([^"]+)"/\1/')
          if [[ -z "$version" ]]; then
            echo "Unable to read version from AirplanesLiveHA/config.yaml" >&2
            exit 1
          fi

          changelog=$(gh api -H "Accept: application/vnd.github.raw" \
            "/repos/${{ github.repository }}/contents/AirplanesLiveHA/CHANGELOG.md?ref=${{ github.event.workflow_run.head_sha }}")
          notes=$(printf '%s\n' "$changelog" | awk -v header="## $version" 'BEGIN{flag=0} $0==header{flag=1;next} /^## /{if(flag){exit}} flag{print}')
          if [[ -z "$notes" ]]; then
            notes="Automated release for v$version"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.metadata.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create git tag
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST \
            "/repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/${{ steps.metadata.outputs.tag }}" \
            -f sha="${{ github.event.workflow_run.head_sha }}"

      - name: Create GitHub release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.metadata.outputs.tag }}" \
            --title "${{ steps.metadata.outputs.tag }}" \
            --notes "${{ steps.metadata.outputs.notes }}" \
            --target "${{ github.event.workflow_run.head_sha }}"
