name: Bump Version and Changelog

on:
  workflow_dispatch:
    inputs:
      bump:
        description: SemVer segment to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      notes:
        description: Optional changelog notes (one bullet per line)
        required: false
        default: ""
        type: string

permissions:
  contents: write
  actions: write

jobs:
  bump:
    name: Bump and commit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump version and changelog
        run: |
          python .github/scripts/bump_version.py \
            --bump "${{ github.event.inputs.bump }}" \
            --notes "${{ github.event.inputs.notes }}"

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            AirplanesLiveHA/config.yaml \
            AirplanesLiveHA/run.py \
            AirplanesLiveHA/Dockerfile \
            AirplanesLiveHA/DOCS.md \
            AirplanesLiveHA/TROUBLESHOOTING.md \
            AirplanesLiveHA/CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): bump version and changelog"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.commit.outputs.changed == 'true'
        run: |
          git push

      - name: Trigger Builder workflow
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/builder.yaml/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}'
