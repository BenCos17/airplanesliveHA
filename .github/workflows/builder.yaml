name: Builder

env:
  BUILD_ARGS: "--test"
  MONITORED_FILES: "build.yaml config.yaml Dockerfile rootfs run.py app.py"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    permissions:
      contents: read
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.0

      - name: Get changed files
        id: changed_files
        if: github.event_name != 'workflow_dispatch'
        uses: Ana06/get-changed-files@v2.3.0
      - name: Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Get changed add-ons
        id: changed_addons
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            declare -a all_addons
            for addon in ${{ steps.addons.outputs.addons }}; do
              all_addons+=("\"${addon}\",")
            done

            changed=$(echo ${all_addons[@]} | rev | cut -c 2- | rev)
            if [[ -n ${changed} ]]; then
              echo "workflow_dispatch detected - building all add-ons: $changed"
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "addons=[$changed]" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "No add-ons found to build"
            exit 0
          fi

          declare -a changed_addons
          for addon in ${{ steps.addons.outputs.addons }}; do
            if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon ]]; then
              for file in ${{ env.MONITORED_FILES }}; do
                  if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon/$file ]]; then
                    if [[ ! "${changed_addons[@]}" =~ $addon ]]; then
                      changed_addons+=("\"${addon}\",");
                    fi
                  fi
              done
            fi
          done

          changed=$(echo ${changed_addons[@]} | rev | cut -c 2- | rev)

          if [[ -n ${changed} ]]; then
            echo "Changed add-ons: $changed";
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "addons=[$changed]" >> $GITHUB_OUTPUT
          else
            echo "No add-on had any monitored files changed (${{ env.MONITORED_FILES }})";
          fi
  build:
    needs: init
    runs-on: ubuntu-latest
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    strategy:
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
        arch: ["aarch64", "amd64"]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Check if add-on should be built
        id: check
        run: |
          if [[ "${{ steps.info.outputs.image }}" == "null" ]]; then
            echo "Image property is not defined, skipping build"
            echo "build_arch=false" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.info.outputs.architectures }}" =~ ${{ matrix.arch }} ]]; then
            echo "build_arch=true" >> $GITHUB_OUTPUT
            echo "image=$(echo ${{ steps.info.outputs.image }} | cut -d'/' -f3)" >> $GITHUB_OUTPUT
            if [[ -z "${{ github.head_ref }}" ]] && [[ "${{ github.ref_name }}" == "main" ]] && [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                echo "BUILD_ARGS=" >> $GITHUB_ENV
            fi
          else
            echo "${{ matrix.arch }} is not a valid arch for ${{ matrix.addon }}, skipping build"
            echo "build_arch=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        if: env.BUILD_ARGS != '--test'
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}





      - name: Prepare Image Metadata
        id: meta
        run: |
          # 1. Lowercase the owner
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          
          # 2. Extract and sanitize image name
          RAW_IMAGE="${{ steps.check.outputs.image }}"
          
          if [[ -z "$RAW_IMAGE" || "$RAW_IMAGE" == "null" ]]; then
            echo "Error: Image name is empty or null. Check your config.yaml."
            exit 1
          fi
          
          # Remove '{arch}' suffix and convert to lowercase
          CLEAN_IMAGE=$(echo "$RAW_IMAGE" | sed -E 's/_{?arch}?//g' | tr '[:upper:]' '[:lower:]')
          
          echo "IMAGE_LC=$CLEAN_IMAGE" >> $GITHUB_ENV
          echo "DEBUG: Final Tag will be: ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/$CLEAN_IMAGE:${{ matrix.arch }}"



      - name: Build and push Add-on
        if: steps.check.outputs.build_arch == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.addon }}
          push: ${{ env.BUILD_ARGS != '--test' }}
          platforms: linux/${{ matrix.arch }}
          # Use the sanitized environment variables here
          tags: ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_LC }}:${{ matrix.arch }}
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base:18.1.1